<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1e1b4b"/>
  
  <!-- Document base -->
  <rect x="30" y="20" width="56" height="72" rx="6" fill="#312e81" stroke="#818cf8" stroke-width="2.5"/>
  
  <!-- Lines on document -->
  <line x1="42" y1="38" x2="74" y2="38" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="50" x2="70" y2="50" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="62" x2="66" y2="62" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="74" x2="62" y2="74" stroke="#4338ca" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Checkmark circle -->
  <circle cx="82" cy="82" r="22" fill="#6366f1"/>
  <circle cx="82" cy="82" r="22" fill="none" stroke="#a5b4fc" stroke-width="2"/>
  <polyline points="72,82 79,89 92,76" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Sparkle accent -->
  <circle cx="96" cy="28" r="4" fill="#c4b5fd"/>
  <circle cx="104" cy="40" r="2.5" fill="#a78bfa"/>
</svg>
