<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0f172a"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Accent gradient blob -->
  <ellipse cx="900" cy="320" rx="300" ry="250" fill="#4f46e5" opacity="0.08"/>
  
  <!-- Icon: document with checkmark -->
  <rect x="100" y="200" width="120" height="160" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>
  <line x1="124" y1="240" x2="196" y2="240" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="268" x2="188" y2="268" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="296" x2="176" y2="296" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="324" x2="168" y2="324" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <circle cx="196" cy="336" r="24" fill="#6366f1"/>
  <polyline points="184,336 192,344 208,328" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Title -->
  <text x="280" y="280" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="72" font-weight="700" fill="#f8fafc">BA-kit Power</text>
  
  <!-- Subtitle -->
  <text x="280" y="340" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Business Analysis Workstation for Kiro IDE</text>
  
  <!-- Flow diagram -->
  <text x="280" y="420" font-family="JetBrains Mono, monospace" font-size="20" fill="#6366f1">intake → backbone → FRD → stories → SRS → wireframes → package</text>
  
  <!-- Bottom badges -->
  <rect x="280" y="470" width="140" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="310" y="494" font-family="Inter, sans-serif" font-size="14" fill="#a5b4fc">32 Steering Files</text>
  
  <rect x="440" y="470" width="160" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="466" y="494" font-family="Inter, sans-serif" font-size="14" fill="#a5b4fc">Template-backed</text>
  
  <rect x="620" y="470" width="140" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="648" y="494" font-family="Inter, sans-serif" font-size="14" fill="#a5b4fc">NLP Routing</text>
  
  <!-- Author -->
  <text x="100" y="590" font-family="Inter, sans-serif" font-size="18" fill="#64748b">TDFS-Dom</text>
  
  <!-- Kiro badge -->
  <rect x="1060" y="560" width="120" height="36" rx="8" fill="#4f46e5"/>
  <text x="1082" y="584" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="white">Kiro Power</text>
</svg>
